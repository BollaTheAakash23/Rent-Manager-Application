<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Login | Rent Manager</title>

        <link rel="stylesheet" th:href="@{/css/login-enhanced.css}">
    </head>
    <body>

    <p class="logout-msg" th:if="${param.logout}">
        You have been logged out
    </p>

    <div class="login-container">
        <div class="login-left">
            <h2>Rent Manager</h2>
            <p>Manage your tenants, properties and payments efficiently.</p>
        </div>
        <div class="login-right">
            <form th:action="@{/login}" method="post">

                <h2 style="margin-bottom: 10px;">Welcome Back</h2>

                <input type="text" name="username" placeholder="Username" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>

                <p class="error" th:if="${param.error}">
                    Invalid username or password
                </p>

                <p style="color: green; font-size: 14px;" th:if="${param.logout}">
                    You have been logged out
                </p>

            </form>
        </div>
    </div>

    </body>
</html>
