<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <div class="utilityButtons">
        <div class="addTenant">
            <form action="/renderPage">
                <input type="hidden" name="whatPage" value="addTenant">
                <input type="submit" value="Add Tenant">
            </form>
        </div>
        <div class="deleteTenant">
            <form action="/renderPage">
                <input type="hidden" name="whatPage" value="deleteTenant">
                <input type="submit" value="Remove Tenant">
            </form>
        </div>
        <div class="addPaymentEntry">
            <form action="/renderPage">
                <input type="hidden" name="whatPage" value="addPaymentEntry">
                <input type="submit" value="Add Payment">
            </form>
        </div>
        <div id="showDefaulters">
            <button id="defaulterButton">Show Overall Defaulters</button>
        </div>
    </div>
    <div id="listOfTenants" class="listOfTenants" style="display: block;">

        <tr th:each="ps : ${paymentStatuses}">
            <td th:text="${ps.tenantName}"></td>
            <td th:text="${ps.flatNo}"></td>
            <td th:text="${ps.rentAmount}"></td>
            <td th:text="${ps.amountRemaining}"></td>
            <td th:text="${ps.houseID}"></td>
            <td th:text="${ps.phoneNo}"></td>
            <td th:text="${ps.paymentStatus}"></td>
            <td>
                <form action="/renderPageTenantID">
                    <input type="hidden" name="tenantID" th:value="${ps.tenantID}">

                    <input type="hidden" name="whatPage" value="updateTenant">
                    <input type="submit" value="Edit">
                </form>
            </td>
        </tr>
    </div>
    <div id="listOfDefaulters" style="display: none;">

        <tr th:each="defaulter : ${overallDefaulters}">
            <td th:text="${defaulter.tenantName}"></td>
            <td th:text="${defaulter.houseID}"></td>
            <td th:text="${defaulter.flatNo}"></td>
            <td th:text="${defaulter.rentAmount}"></td>
            <td th:text="${defaulter.phoneNo}"></td>
            <td th:text="${defaulter.overallOutstandingAmount}"></td>
            <br>
        </tr>

    </div>
    <div id="logout">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" >
            <input type="submit" value="Logout">
        </form>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded",
            function()
            {
                let flag = 0;
            }
        )
    </script>
    <script>
        document.addEventListener("DOMContentLoaded",
            function()
            {
                let flag = 0;

                const tenantListContext = document.getElementById("listOfTenants");
                const defaulterListContext = document.getElementById("listOfDefaulters");
                const defaulterShowButtonContext = document.getElementById("showDefaulters");
        
                defaulterShowButtonContext.addEventListener("click",
                    function()
                    {
                        if(flag === 0)
                        {    
                            tenantListContext.style.display = "none";
                            defaulterListContext.style.display = "block";

                            flag = 1;
                        }
                        else
                        {
                            tenantListContext.style.display = "block";
                            defaulterListContext.style.display = "none";

                            flag = 0;
                        }
                    }
                )
            }
        )
    </script>
</body>
</html>
